services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: talenttrust
      POSTGRES_PASSWORD: talenttrust
      POSTGRES_DB: talenttrust
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U talenttrust"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://talenttrust:talenttrust@postgres:5432/talenttrust
      REDIS_URL: redis://redis:6379/0
      LLM_PROVIDER: mock
      EMBEDDING_PROVIDER: mock
      JWT_SECRET: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  # worker and frontend services are added in later phases (CV analysis, dashboard)

volumes:
  pgdata:
